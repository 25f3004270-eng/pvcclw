{% extends "base.html" %}
{% block title %}{{ 'Edit Tender' if tender else 'Add Tender' }}{% endblock %}
{% block content %}
<div class="container mt-3">
  <h2 class="mb-4">{{ 'Edit Tender' if tender else 'Add Tender' }}</h2>
  <form method="post" class="col-md-8">
    <div class="mb-3">
      <label class="form-label fw-semibold">Item</label>
      <select name="itemid" class="form-select" required>
        <option value="">-- Select Item --</option>
        {% for item in items %}
        <option value="{{ item.id }}" {% if tender and tender.item_id == item.id %}selected{% endif %}>{{ item.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Tender No</label>
      <input type="text" name="tenderno" class="form-control" value="{{ tender.tender_no if tender else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Basic Rate</label>
      <input type="number" step="0.01" name="basicrate" class="form-control" value="{{ tender.basicrate if tender else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">PVC Base Date</label>
      <input type="date" name="pvcbasedate" class="form-control" value="{{ tender.pvcbasedate if tender else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Freight Rate per Unit</label>
      <input type="number" step="0.01" name="freightrateperunit" class="form-control" value="{{ tender.freightrateperunit if tender else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Lower Rate</label>
      <input type="number" step="0.01" name="lowerrate" class="form-control" value="{{ tender.lowerrate if tender else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Lower Freight Rate per Unit</label>
      <input type="number" step="0.01" name="lowerfreight" class="form-control" value="{{ tender.lowerfreight if tender else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Lower Rate Base Date</label>
      <input type="date" name="lowerratebasedate" class="form-control" value="{{ tender.lowerratebasedate if tender else '' }}">
    </div>
    <button type="submit" class="btn btn-success">Save Tender</button>
    <a href="{{ url_for('admintenderslist') }}" class="btn btn-secondary ms-2">Back to Tenders</a>
  </form>
</div>
{% endblock %}
