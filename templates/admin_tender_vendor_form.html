{% extends "base.html" %}
{% block title %}{{ 'Edit Vendor' if vendor else 'Add Vendor' }}{% endblock %}
{% block content %}
<div class="mt-3 col-md-8">
  <h2>{{ 'Edit Vendor' if vendor else 'Add Vendor' }} - Tender {{ tender.tender_no }}</h2>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">PO No</label>
      <input type="text" name="pono" class="form-control" value="{{ vendor.po_no if vendor else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Vendor Name</label>
      <input type="text" name="vendorname" class="form-control" value="{{ vendor.vendor_name if vendor else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">CIF</label>
      <input type="number" step="0.01" name="cif" class="form-control" value="{{ vendor.cif if vendor else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Currency</label>
      <input type="text" name="currency" class="form-control" value="{{ vendor.currency if vendor else '' }}" required placeholder="USD, EUR, INR">
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{{ url_for('admintendervendorslist', tenderid=tender.id) }}" class="btn btn-secondary">Back</a>
  </form>
</div>
{% endblock %}
